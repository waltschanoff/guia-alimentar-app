<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guia Alimentar</title>

  <link rel="manifest" href="manifest.json" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #000;
      color: white;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<h1>Guia Alimentar</h1>

<div class="card">
  <h3>Café da manhã</h3>
  <p>Pão + ovo + café</p>
</div>

<div class="card">
  <h3>Almoço</h3>
  <p>Arroz + feijão + frango + legumes</p>
</div>

<div class="card">
  <h3>Jantar</h3>
  <p>Proteína + legumes</p>
</div>

</body>
</html>
